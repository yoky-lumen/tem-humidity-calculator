<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>温控计算器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #1f2329;
      --subtext: #8a929c;
      --line: rgba(31, 35, 41, .08);
      --field: #ffffff;
      --field-border: rgba(31, 35, 41, .1);
      --shadow-card: 0 1px 2px rgba(31, 35, 41, .04), 0 12px 32px rgba(31, 35, 41, .07);
      --shadow-soft: 0 1px 2px rgba(31, 35, 41, .04), 0 4px 12px rgba(31, 35, 41, .05);
      --danger: #e5767e;
      --danger-bg: #fdf3f4;
      --strawberry-main: #ff5773;
      --strawberry-soft: #ffe1e5;
      --strawberry-deep: #e63950;
      --vegetable-main: #22c55e;
      --vegetable-soft: #dcfce7;
      --vegetable-deep: #16a34a;
      --card-main: var(--strawberry-main);
      --card-soft: var(--strawberry-soft);
      --card-deep: var(--strawberry-deep);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f7f8fa;
      -webkit-font-smoothing: antialiased;
    }

    body {
      padding: max(14px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom));
      position: relative;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      right: 0;
      width: 70vw;
      height: 45vh;
      max-width: 520px;
      max-height: 420px;
      background: radial-gradient(circle at 80% 18%, color-mix(in srgb, var(--card-main) 34%, transparent), transparent 62%);
      pointer-events: none;
      z-index: 0;
      transition: background .45s ease;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      width: min(100%, 430px);
      min-height: calc(100vh - 32px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      position: relative;
      z-index: 1;
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 30;
      width: min(calc(100% - 56px), 320px);
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(31, 35, 41, .94);
      color: #fff;
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
      box-shadow: 0 20px 48px rgba(0, 0, 0, .28);
      transform: translate(-50%, -50%) scale(.92);
      opacity: 0;
      transition: .25s cubic-bezier(.22, 1, .36, 1);
      backdrop-filter: blur(16px);
      pointer-events: none;
    }

    .toast.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }

    .hero {
      padding: 8px 2px 12px;
      text-align: center;
      animation: rise .5s ease both;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.15;
    }

    .sub {
      margin: 5px 0 0;
      color: var(--subtext);
      font-size: 13px;
      font-weight: 500;
    }

    .control-bar {
      position: relative;
      margin: 2px 0 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      transition: .3s ease;
      animation: rise .5s ease .06s both;
    }

    .control-bar::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--card-main);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--card-main) 16%, transparent);
      transition: .3s ease;
      z-index: 2;
    }

    select {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 54px;
      padding: 0 56px 0 40px;
      border: 0;
      appearance: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: clamp(16px, 4.8vw, 20px);
      font-weight: 700;
      letter-spacing: -.01em;
    }

    .chevron {
      position: absolute;
      right: 20px;
      top: 50%;
      width: 20px;
      height: 20px;
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 2;
    }

    .chevron::before,
    .chevron::after {
      content: "";
      position: absolute;
      top: 11px;
      width: 11px;
      height: 2px;
      border-radius: 999px;
      background: var(--subtext);
    }

    .chevron::before {
      left: 1px;
      transform: rotate(42deg);
    }

    .chevron::after {
      right: 1px;
      transform: rotate(-42deg);
    }

    .card {
      position: relative;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fff;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: .3s ease;
      animation: rise .55s ease .12s both;
    }

    .card::before,
    .card::after {
      content: none;
    }

    .card-content {
      position: relative;
      z-index: 1;
    }

    .section {
      padding: 2px 0 0;
    }

    .section + .section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 11px;
    }

    .label {
      margin: 0;
      font-size: clamp(16px, 4.6vw, 19px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -.01em;
    }

    .badge {
      flex: 0 0 auto;
      padding: 4px 9px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--card-soft) 55%, #fff);
      color: var(--card-deep);
      font-size: 11.5px;
      font-weight: 700;
      border: 1px solid color-mix(in srgb, var(--card-main) 18%, transparent);
      transition: .3s ease;
      font-feature-settings: "tnum" 1;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .input-box {
      position: relative;
    }

    .input-box span {
      position: absolute;
      left: 10px;
      top: 6px;
      color: color-mix(in srgb, var(--card-deep) 72%, transparent);
      font-size: 10.5px;
      font-weight: 800;
      pointer-events: none;
      letter-spacing: .04em;
      transition: .3s ease;
      font-feature-settings: "tnum" 1;
    }

    .number-input {
      width: 100%;
      height: 48px;
      padding: 16px 6px 4px;
      border: 1px solid var(--field-border);
      border-radius: 14px;
      outline: none;
      background: var(--field);
      color: #1c1c1c;
      font-size: clamp(15px, 4.4vw, 19px);
      font-weight: 700;
      text-align: center;
      font-feature-settings: "tnum" 1;
      transition: .2s ease;
    }

    .number-input::placeholder {
      color: rgba(31, 35, 41, .22);
      font-weight: 500;
    }

    .number-input:focus {
      background: #fff;
      border-color: color-mix(in srgb, var(--card-deep) 45%, transparent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--card-main) 15%, transparent);
    }

    .number-input.warn {
      border-color: var(--danger);
      background: var(--danger-bg);
      box-shadow: 0 0 0 4px rgba(229, 118, 126, .14);
    }

    .range-info {
      margin: 2px 0 10px;
      padding: 9px 12px;
      border-radius: 11px;
      background: color-mix(in srgb, var(--card-soft) 32%, #fff);
      color: rgba(31, 35, 41, .62);
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      letter-spacing: .005em;
      border: 1px solid color-mix(in srgb, var(--card-main) 12%, transparent);
      transition: .3s ease;
      font-feature-settings: "tnum" 1;
    }

    .set-panel {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 9px;
      padding: 2px 0;
    }

    .set-label {
      font-size: clamp(13.5px, 3.9vw, 16px);
      font-weight: 600;
      color: var(--text);
    }

    .set-input {
      width: 96px;
      height: 40px;
      padding: 0 8px;
      border: 1px solid color-mix(in srgb, var(--card-deep) 26%, transparent);
      border-radius: 12px;
      background: color-mix(in srgb, var(--card-soft) 30%, #fff);
      color: var(--card-deep);
      font-size: clamp(15px, 4.4vw, 18px);
      font-weight: 800;
      text-align: center;
      outline: none;
      cursor: default;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .6);
      transition: .3s ease;
      font-feature-settings: "tnum" 1;
    }

    .set-unit {
      font-size: clamp(13.5px, 3.9vw, 16px);
      font-weight: 700;
      color: var(--text);
    }

    .result-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      min-height: 78px;
      padding: 12px 14px 12px 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, .56);
      border: 1px solid rgba(255, 255, 255, .58);
      backdrop-filter: blur(14px);
    }

    .result-title {
      color: rgba(0, 0, 0, .62);
      font-size: 16px;
      font-weight: 650;
    }

    .result-desc {
      margin-top: 3px;
      color: rgba(0, 0, 0, .46);
      font-size: 12px;
    }

    .result-value {
      display: flex;
      align-items: baseline;
      justify-content: center;
      min-width: 122px;
      min-height: 54px;
      padding: 0 13px;
      border-radius: 17px;
      background: #fff;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .05);
      color: var(--card-deep);
      font-weight: 800;
    }

    output {
      font-size: clamp(28px, 8vw, 36px);
      line-height: 1;
      font-feature-settings: "tnum" 1;
    }

    .unit {
      margin-left: 3px;
      font-size: 18px;
      font-weight: 750;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
      animation: rise .5s ease .2s both;
    }

    button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--card-deep);
      font-size: clamp(13.5px, 3.9vw, 16px);
      font-weight: 700;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: .2s ease;
    }

    button.primary {
      border: 1px solid var(--card-deep);
      background: var(--card-deep);
      color: #fff;
      box-shadow: var(--shadow-soft);
    }

    button:active {
      transform: translateY(1px) scale(.99);
      filter: brightness(.97);
    }

    .footer-note {
      margin: 10px 4px 0;
      color: var(--subtext);
      font-size: 11.5px;
      line-height: 1.5;
      text-align: center;
      animation: rise .5s ease .26s both;
    }

    @media (max-width: 370px) {
      body {
        padding-left: 12px;
        padding-right: 12px;
      }

      .hero {
        padding-top: 6px;
      }

      .card {
        padding: 15px;
        border-radius: 20px;
      }

      .number-input {
        height: 48px;
        border-radius: 13px;
      }

      .range-info {
        padding: 8px 10px;
        font-size: 11.5px;
        border-radius: 10px;
      }

      .set-panel {
        gap: 6px;
      }

      .set-label, .set-unit {
        font-size: 13px;
      }

      .set-input {
        width: 88px;
        height: 38px;
        border-radius: 11px;
        font-size: 16px;
      }

      .result-panel {
        grid-template-columns: 1fr;
      }

      .result-value {
        width: 100%;
      }

      .actions {
        gap: 7px;
      }

      button {
        min-height: 44px;
        border-radius: 13px;
      }
    }

    @media (min-width: 560px) {
      body {
        padding-top: 26px;
      }

      .app {
        min-height: auto;
      }
    }
  </style>
</head>

<body>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <main class="app" id="app">
    <header class="hero">
      <h1>温控计算器</h1>
      <p class="sub">输入 3 组当前数据，自动计算设定值</p>
    </header>

    <div class="control-bar">
      <select id="roomType" aria-label="选择控制室">
        <option value="strawberry">草莓控制室</option>
        <option value="vegetable">蔬菜控制室</option>
      </select>
      <span class="chevron" aria-hidden="true"></span>
    </div>

    <section class="card" id="mainCard">
      <div class="card-content">
        <div class="section">
          <div class="section-head">
            <h2 class="label">当前的温度（℃）</h2>
            <span class="badge">-20 ~ 60℃</span>
          </div>

          <div class="inputs">
            <label class="input-box">
              <span>01</span>
              <input class="number-input" inputmode="decimal" autocomplete="off" aria-label="温度 1" data-type="temperature" />
            </label>
            <label class="input-box">
              <span>02</span>
              <input class="number-input" inputmode="decimal" autocomplete="off" aria-label="温度 2" data-type="temperature" />
            </label>
            <label class="input-box">
              <span>03</span>
              <input class="number-input" inputmode="decimal" autocomplete="off" aria-label="温度 3" data-type="temperature" />
            </label>
          </div>

          <div class="range-info" id="tempRangeInfo">当前正负区间为 -- ~ -- ℃</div>

          <div class="set-panel">
            <span class="set-label">设定温度为</span>
            <input class="set-input" id="temperatureResult" inputmode="decimal" readonly />
            <span class="set-unit">℃</span>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <h2 class="label">湿度（百分比 %）</h2>
            <span class="badge">0 ~ 100%</span>
          </div>

          <div class="inputs">
            <label class="input-box">
              <span>01</span>
              <input class="number-input" inputmode="decimal" autocomplete="off" aria-label="湿度 1" data-type="humidity" />
            </label>
            <label class="input-box">
              <span>02</span>
              <input class="number-input" inputmode="decimal" autocomplete="off" aria-label="湿度 2" data-type="humidity" />
            </label>
            <label class="input-box">
              <span>03</span>
              <input class="number-input" inputmode="decimal" autocomplete="off" aria-label="湿度 3" data-type="humidity" />
            </label>
          </div>

          <div class="range-info" id="humidityRangeInfo">当前正负区间为 -- ~ -- %</div>

          <div class="set-panel">
            <span class="set-label">设定湿度为</span>
            <input class="set-input" id="humidityResult" inputmode="decimal" readonly />
            <span class="set-unit">%</span>
          </div>
        </div>
      </div>
    </section>

    <div class="actions">
      <button type="button" id="clearTemperature">清空温度</button>
      <button type="button" id="clearHumidity">清空湿度</button>
      <button type="button" class="primary" id="clearAll">清空全部</button>
    </div>

    <div class="footer-note" id="ruleHint">
      草莓控制室：温度允许偏差 ±1.5℃，湿度允许偏差为平均湿度的 ±5%
    </div>
  </main>

  <script>
    const CONFIG = {
      strawberry: {
        label: "草莓控制室",
        humidityRatio: 0.05,
        main: "#ff5773",
        soft: "#ffe1e5",
        deep: "#e63950",
        hint: "草莓控制室：温度允许偏差 ±1.5℃，湿度允许偏差为平均湿度的 ±5%",
        humidityRule: "草莓模式：偏差超过平均湿度 ±5% 会提示"
      },
      vegetable: {
        label: "蔬菜控制室",
        humidityRatio: 0.10,
        main: "#22c55e",
        soft: "#dcfce7",
        deep: "#16a34a",
        hint: "蔬菜控制室：温度允许偏差 ±1.5℃，湿度允许偏差为平均湿度的 ±10%",
        humidityRule: "蔬菜模式：偏差超过平均湿度 ±10% 会提示"
      }
    };

    const LIMITS = {
      temperature: { min: -20, max: 60, label: "温度", unit: "℃" },
      humidity: { min: 0, max: 100, label: "湿度", unit: "%" }
    };

    const root = document.documentElement;
    const roomType = document.querySelector("#roomType");
    const ruleHint = document.querySelector("#ruleHint");
    const toast = document.querySelector("#toast");
    const temperatureResult = document.querySelector("#temperatureResult");
    const humidityResult = document.querySelector("#humidityResult");
    const tempRangeInfo = document.querySelector("#tempRangeInfo");
    const humidityRangeInfo = document.querySelector("#humidityRangeInfo");
    const inputs = Array.from(document.querySelectorAll(".number-input"));

    let toastTimer = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2800);
    }

    function toNumber(value) {
      if (value === "" || value === "-" || value === "." || value === "-.") return null;
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function round1(number) {
      return (Math.round(number * 10) / 10).toFixed(1);
    }

    function average(values) {
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function sanitizeInput(input) {
      const type = input.dataset.type;
      const limit = LIMITS[type];

      let value = input.value
        .replace(/[^\d.-]/g, "")
        .replace(/(?!^)-/g, "");

      const dotIndex = value.indexOf(".");
      if (dotIndex !== -1) {
        value = value.slice(0, dotIndex + 1) + value.slice(dotIndex + 1).replace(/\./g, "");
      }

      if (type === "humidity") value = value.replace(/-/g, "");

      input.value = value;

      const number = toNumber(value);
      if (number === null) {
        input.dataset.lastValid = value;
        return true;
      }

      if (number < limit.min || number > limit.max) {
        input.value = input.dataset.lastValid || "";
        showToast(`${limit.label}只能输入 ${limit.min} ~ ${limit.max}${limit.unit}`);
        return false;
      }

      input.dataset.lastValid = input.value;
      return true;
    }

    function getRange(type, avg) {
      if (type === "temperature") {
        return { min: avg - 1.5, max: avg + 1.5 };
      }

      const ratio = CONFIG[roomType.value].humidityRatio;
      return { min: avg - avg * ratio, max: avg + avg * ratio };
    }

    function setResult(type, value) {
      if (type === "temperature") temperatureResult.value = value;
      if (type === "humidity") humidityResult.value = value;
    }

    function validateGroup(type, shouldToast = true) {
      const groupInputs = inputs.filter(input => input.dataset.type === type);
      const values = groupInputs.map(input => toNumber(input.value));
      const rangeInfo = type === "temperature" ? tempRangeInfo : humidityRangeInfo;

      groupInputs.forEach(input => input.classList.remove("warn"));

      if (values.some(value => value === null)) {
        setResult(type, "--");
        rangeInfo.textContent = `当前正负区间为 -- ~ -- ${LIMITS[type].unit}`;
        return;
      }

      const avg = average(values);
      const range = getRange(type, avg);
      const outOfRange = [];

      values.forEach((value, index) => {
        if (value < range.min || value > range.max) {
          groupInputs[index].classList.add("warn");
          outOfRange.push(index + 1);
        }
      });

      setResult(type, round1(avg));
      rangeInfo.textContent = `当前正负区间为 ${round1(range.min)} ~ ${round1(range.max)} ${LIMITS[type].unit}`;

      if (outOfRange.length && shouldToast) {
        const limit = LIMITS[type];
        showToast(
          `${limit.label}第 ${outOfRange.join("、")} 项不在允许区间：${round1(range.min)} ~ ${round1(range.max)}${limit.unit}。`
        );
      }
    }

    function calculateAll(shouldToast = true) {
      validateGroup("temperature", shouldToast);
      validateGroup("humidity", shouldToast);
    }

    function updateTheme() {
      const current = CONFIG[roomType.value];

      root.style.setProperty("--card-main", current.main);
      root.style.setProperty("--card-soft", current.soft);
      root.style.setProperty("--card-deep", current.deep);

      ruleHint.textContent = current.hint;

      calculateAll(false);
    }

    function clearGroup(type) {
      inputs
        .filter(input => input.dataset.type === type)
        .forEach(input => {
          input.value = "";
          input.dataset.lastValid = "";
          input.classList.remove("warn");
        });

      setResult(type, "--");
      const rangeInfo = type === "temperature" ? tempRangeInfo : humidityRangeInfo;
      rangeInfo.textContent = `当前正负区间为 -- ~ -- ${LIMITS[type].unit}`;
    }

    inputs.forEach(input => {
      input.dataset.lastValid = "";

      input.addEventListener("input", () => {
        if (sanitizeInput(input)) calculateAll(true);
      });

      input.addEventListener("blur", () => {
        const number = toNumber(input.value);
        if (number !== null) {
          input.value = round1(number).replace(/\.0$/, "");
          input.dataset.lastValid = input.value;
        }
        calculateAll(false);
      });
    });

    roomType.addEventListener("change", updateTheme);

    document.querySelector("#clearTemperature").addEventListener("click", () => clearGroup("temperature"));
    document.querySelector("#clearHumidity").addEventListener("click", () => clearGroup("humidity"));
    document.querySelector("#clearAll").addEventListener("click", () => {
      clearGroup("temperature");
      clearGroup("humidity");
    });

    updateTheme();
  </script>
</body>
</html>
